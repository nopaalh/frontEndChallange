<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Travelly</title>
  </head>
  <body>
    <div class="header">
      <div class="headerLogo">
        <div class="logoImage">
          <img src="./images/companyLogo.png" alt="Travelly Logo" />
        </div>
        <h5>Travelly</h5>
      </div>
      <ul class="headerList">
        <li>Home</li>
        <li>Destinations</li>
        <li>About</li>
        <li>Contact</li>
        <li class="button">Book Now</li>
      </ul>
    </div>
    <div class="hero">
      <h1>Explore the world with us</h1>
      <p>
        Discover amazing places at exclusive deals and create unforgettable
        memory
      </p>
      <a href="#">Explore Destinations</a>
    </div>
    <div class="benefit"></div>
    <div class="destionation"></div>
    <div class="cta"></div>

    <!-- Footer -->
    <div class="footer">
      <div class="footerLogo">
        <div class="footerLogoImage">
          <img src="./images/companyLogo.png" alt="Travelly Logo" />
        </div>
        <h5>Travelly</h5>
      </div>
      <div class="footerNavbar">
        <ul class="footerList">
          <li>Home</li>
          <li>Destinations</li>
          <li>About</li>
          <li>Contact</li>
        </ul>
        <p>&copy 2024 Travelly. All rights reserved</p>
      </div>
      <div class="footerMedia">
        <div class="footerMediaCard">
          <a href="#"
            ><img src="./images/icons8-facebook-50.png" alt="Facebook"
          /></a>
        </div>
        <div class="footerMediaCard">
          <a href="#"
            ><img src="./images/icons8-instagram-logo-50.png" alt="Instagram"
          /></a>
        </div>
        <div class="footerMediaCard">
          <a href="#"
            ><img src="./images/icons8-twitter-logo-50.png" alt="Twitter"
          /></a>
        </div>
      </div>
    </div>
  </body>
</html>
